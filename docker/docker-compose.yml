services:
  mco-drought:
    user: "mco-drought"
    platform: linux/amd64
    build:
      context: ..           # repo root — needed so COPY R/ works in Dockerfile
      dockerfile: docker/Dockerfile
    image: mco-drought-pipeline:latest
    container_name: mco-drought
    environment:
      TZ: America/Denver
      START_YEAR: "1979"
      CORES: "8"
      KEEP_TILES: "0"
      CONUS_MASK: "1"
      TILE_DX: "2"
      TILE_DY: "2"
      CLIM_PERIODS: "rolling:30,full"
      TIMESCALES: "15,30,45,60,90,120,180,365,730,wy,ytd"
      # Examples:
      # CLIM_PERIODS: "rolling:30,fixed:1991:2020"
      # CLIM_PERIODS: "fixed:1991:2020,full"
      # TIMESCALES: "30"   # run only 30-day timescale for quick testing
    mem_limit: 30g
    mem_reservation: 8g
    volumes:
      - ..:/home/mco-drought/mco-drought-conus:rw                          # repo root (relative to this file)
      - ${DATA_DIR:-${HOME}/mco-drought-conus-data}:/home/mco-drought/mco-drought-conus-data:rw
    restart: "no"
